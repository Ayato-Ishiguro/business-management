name: CI

on:
  push:
    branches: [main]
    # 重要: CIファイル自体が変更された場合は実行しない
    paths-ignore:
      - ".github/workflows/**"

jobs:
  build:
    # 重要: 同時実行を制限
    concurrency:
      group: ci-${{ github.ref }}
      cancel-in-progress: true

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.11.1"
          cache: "npm"

      - name: Install root dependencies
        run: npm install

      - name: Install server dependencies
        run: |
          cd server
          npm install @nestjs/common @nestjs/core @nestjs/config @nestjs/platform-express dotenv
          npm install --save-dev @types/node typescript

      - name: Install dependencies (backend)
        run: cd backend && npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
